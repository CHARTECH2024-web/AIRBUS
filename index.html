<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CHARLES - Messenger (mobile ready)</title>

<!-- Firebase compat libs (Firestore + Auth + Realtime DB) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
  :root{
    --bg:#151515; --panel:#1f1f1f; --muted:#a8a8a8; --accent:#ffd700; --text:#fff;
    --radius:14px;
  }
  *{box-sizing:border-box;font-family: "Segoe UI", Roboto, Arial; }
  html,body{height:100%; margin:0; background:var(--bg); color:var(--text);}
  #app{max-width:1100px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:12px;}
  /* NAV */
  .nav{display:flex;align-items:center;gap:12px;padding:10px 6px;}
  .tabs{display:flex;gap:10px;flex:1;}
  .tab{padding:8px 12px;border-radius:999px;background:transparent;color:var(--muted);cursor:pointer}
  .tab.active{background:var(--accent);color:#111}
  .user-info{display:flex;align-items:center;gap:8px}
  /* layout */
  .shell{flex:1;display:flex;gap:12px;height:calc(100% - 64px);}
  .left{width:340px;background:var(--panel);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.03)}
  .right{flex:1;background:var(--panel);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column}
  .list-header{padding:12px 14px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;align-items:center}
  .conversations{flex:1;overflow:auto}
  .conv-item{padding:12px;display:flex;gap:10px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.02);cursor:pointer}
  .conv-item:hover{background:rgba(255,255,255,0.01)}
  .conv-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--accent);color:#111;font-weight:700}
  .conv-title{font-weight:600}
  .online-dot{width:10px;height:10px;border-radius:50%;background:#00ff7f;border:2px solid var(--panel)}
  /* chat area */
  .chat-header{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:12px}
  .messages{flex:1;padding:12px;overflow:auto;display:flex;flex-direction:column;gap:8px}
  .message{max-width:75%;padding:10px 12px;border-radius:14px;line-height:1.3}
  .message.user{align-self:flex-end;background:linear-gradient(90deg,#ffd700,#ffcc00);color:#111;border-bottom-right-radius:4px}
  .message.other{align-self:flex-start;background:rgba(255,255,255,0.03);color:var(--text)}
  .input-area{display:flex;gap:8px;padding:12px;border-top:1px solid rgba(255,255,255,0.03);align-items:center}
  .input-area input{flex:1;padding:10px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.05);background:transparent;color:var(--text)}
  .send-btn{width:46px;height:46px;border-radius:50%;background:var(--accent);color:#111;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
  /* modal simple */
  .modal{position:fixed;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);z-index:999}
  .modal-box{width:92%;max-width:420px;background:var(--panel);padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.04)}
  .row{display:flex;gap:8px;align-items:center}
  .btn{padding:8px 12px;border-radius:8px;cursor:pointer;border:none}
  .btn.primary{background:var(--accent);color:#111}
  /* responsive mobile: show list or chat */
  @media (max-width:780px){
    .shell{flex-direction:column;height:calc(100% - 64px)}
    .left{width:100%;height:50vh;border-radius:12px}
    .right{width:100%;height:50vh;border-radius:12px}
    /* show list by default; when .show-chat is on body, show chat instead */
    body.show-chat .left{display:none}
    body.show-chat .right{display:flex}
  }
  /* helper */
  .badge{background:#ff4d4d;padding:4px 8px;border-radius:12px;font-size:12px;color:#111}
  .muted{color:var(--muted)}
  .small{font-size:13px}
</style>
</head>
<body>

<div id="app">
  <div class="nav">
    <div class="tabs">
      <div class="tab active" data-tab="private">💬 IA CP</div>
      <div class="tab" data-tab="group">👥 CG</div>
      <div class="tab" data-tab="ai">🤖 IA Charles</div>
      <div class="tab" data-tab="settings">⚙️</div>
    </div>
    <div class="user-info">
      <span id="user-display" class="muted small"></span>
      <button id="logout" class="btn">Déconnexion</button>
    </div>
  </div>

  <div class="shell">
    <div class="left" id="left-panel">
      <div class="list-header">
        <div id="list-title">Conversations</div>
        <div>
          <button id="add-btn" class="btn">➕</button>
        </div>
      </div>
      <div class="conversations" id="conversations"></div>
    </div>

    <div class="right" id="chat-panel">
      <div class="chat-header">
        <div id="chat-title">Sélectionnez une conversation</div>
        <div style="margin-left:auto" id="status-area"></div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area" id="input-area" style="display:none">
        <input id="message-input" placeholder="Écrire un message..." autocomplete="off"/>
        <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- modal create private -->
<div id="modal-private" class="modal" style="display:none">
  <div class="modal-box">
    <h3>Nouvelle conversation privée</h3>
    <input id="private-contact" placeholder="Email ou téléphone (+243...)" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);margin:8px 0;background:transparent;color:var(--text)"/>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button id="cancel-private" class="btn">Annuler</button>
      <button id="create-private" class="btn primary">Démarrer</button>
    </div>
  </div>
</div>

<!-- hidden audio -->
<audio id="notify-sound" src="data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="></audio>

<script>
/* --------------------
  CONFIGURATION FIREBASE (TA CONFIGURATION)
  Remplace databaseURL si elle est différente dans ta console Realtime DB
   -------------------- */
const firebaseConfig = {
    apiKey: "AIzaSyBp2RhutYDFnqglXQrZaq4KJZpDJH1fmDk",
    authDomain: "boeing-777-d5b8b.firebaseapp.com",
    projectId: "boeing-777-d5b8b",
    storageBucket: "boeing-777-d5b8b.firebasestorage.app",
    messagingSenderId: "1001844513991",
    appId: "1:1001844513991:web:4e4cd474abe651c44232e2",
    measurementId: "G-D7ZC4XYSKK",
    // databaseURL ajouté pour Realtime DB (présence). Remplace si besoin par l'URL exacte depuis ta console Firebase.
    databaseURL: "https://boeing-777-d5b8b-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const rdb = firebase.database();

/* --------------------
  ELEMENTS
  -------------------- */
const conversationsEl = document.getElementById('conversations');
const messagesEl = document.getElementById('messages');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const addBtn = document.getElementById('add-btn');
const modalPrivate = document.getElementById('modal-private');
const createPrivateBtn = document.getElementById('create-private');
const cancelPrivateBtn = document.getElementById('cancel-private');
const privateContactInput = document.getElementById('private-contact');
const chatTitle = document.getElementById('chat-title');
const inputArea = document.getElementById('input-area');
const userDisplay = document.getElementById('user-display');
const notifySound = document.getElementById('notify-sound');

/* --------------------
  ÉTAT
  -------------------- */
let currentUser = null;
let currentTab = 'private';
let currentConvId = null;
let currentConvType = null;
let convMessagesUnsub = null;
let convsUnsub = null;
let presenceRefs = {}; // pour détacher les listeners de présence

/* --------------------
  AUTH (Gère l'état de la session)
  - Si tu utilises déjà un écran de login dans ton app, garde-le; ici on écoute onAuthStateChanged.
  -------------------- */
auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser = user;
    userDisplay.textContent = user.email || user.phoneNumber || user.uid;
    // set presence in RTDB
    setUserPresence(user.uid);
    // demander permission notifications
    requestNotificationPermission();
    // charger conversations
    loadConversations(currentTab);
  } else {
    userDisplay.textContent = "Non connecté";
    // option: redirect to login page si tu veux
  }
});

/* --------------------
  PRESENCE (Realtime Database)
  -------------------- */
function setUserPresence(uid){
  const userStatusRef = rdb.ref('/status/' + uid);
  const isOfflineForDB = { state:'offline', last_changed: firebase.database.ServerValue.TIMESTAMP };
  const isOnlineForDB = { state:'online', last_changed: firebase.database.ServerValue.TIMESTAMP };

  rdb.ref('.info/connected').on('value', (snap)=>{
    if(snap.val() === false){
      return;
    }
    userStatusRef.onDisconnect().set(isOfflineForDB).then(()=>{
      userStatusRef.set(isOnlineForDB);
    });
  });

  window.addEventListener('beforeunload', ()=>{
    userStatusRef.set(isOfflineForDB);
  });
}

/* helper pour écouter la présence d'un user */
function watchUserPresence(otherId, elementToUpdate){
  if(!otherId) return;
  const refPath = '/status/' + otherId;
  if(presenceRefs[otherId]) return;
  const ref = rdb.ref(refPath);
  presenceRefs[otherId] = ref;
  ref.on('value', snapshot=>{
    const val = snapshot.val();
    const onlineElem = elementToUpdate.querySelector('.online-dot');
    if(val && val.state === 'online'){
      if(onlineElem) onlineElem.style.display = 'block';
    } else {
      if(onlineElem) onlineElem.style.display = 'none';
    }
  });
}

/* --------------------
  CHARGER CONVERSATIONS
  -------------------- */
function loadConversations(type){
  if(convsUnsub) convsUnsub();
  conversationsEl.innerHTML = `<div style="padding:18px;text-align:center;color:var(--muted)">Chargement...</div>`;

  const collection = type === 'private' ? 'privateConversations' : 'groups';
  convsUnsub = db.collection(collection)
    .where('participants','array-contains', currentUser.uid)
    .orderBy('updatedAt','desc')
    .onSnapshot(snapshot=>{
      conversationsEl.innerHTML = '';
      if(snapshot.empty){
        conversationsEl.innerHTML = `<div style="padding:20px;color:var(--muted)">Aucune conversation. Appuie sur + pour en créer une.</div>`;
        return;
      }
      snapshot.forEach(doc=>{
        const data = doc.data();
        let title = data.name || '';
        let otherId = null;
        if(collection === 'privateConversations'){
          otherId = data.participants.find(p=>p !== currentUser.uid);
        } else {
          title = data.name || 'Groupe';
        }
        if(!title && otherId) title = otherId;
        const item = document.createElement('div');
        item.className = 'conv-item';
        item.dataset.convId = doc.id;
        item.dataset.convType = collection === 'privateConversations' ? 'private' : 'group';
        item.innerHTML = `
          <div style="position:relative">
            <div class="conv-avatar">${title.charAt(0).toUpperCase()}</div>
            <div class="online-dot" style="position:absolute;right:-4px;bottom:-4px;display:none"></div>
          </div>
          <div style="flex:1">
            <div class="conv-title">${title}</div>
            <div class="small muted">${data.lastMessage ? data.lastMessage.substring(0,70) : ''}</div>
          </div>
          <div class="small muted">${data.updatedAt ? timeAgo(data.updatedAt.toMillis ? data.updatedAt.toMillis() : data.updatedAt) : ''}</div>
        `;
        item.addEventListener('click', ()=> {
          document.querySelectorAll('.conv-item').forEach(i=>i.classList.remove('selected'));
          item.classList.add('selected');
          selectConversation(doc.id, item.dataset.convType, title, otherId);
          if(window.innerWidth <= 780) document.body.classList.add('show-chat');
        });

        conversationsEl.appendChild(item);

        if(otherId){
          watchUserPresence(otherId, item);
        }
      });
    }, err=>{
      console.error('Erreur loadConversations', err);
      conversationsEl.innerHTML = `<div style="padding:20px;color:var(--muted)">Erreur: ${err.message}</div>`;
    });
}

/* --------------------
  SELECTION CONVERSATION + MESSAGES
  -------------------- */
function selectConversation(convId, type, title, otherId){
  if(convMessagesUnsub) convMessagesUnsub();
  currentConvId = convId;
  currentConvType = type;
  chatTitle.textContent = title;
  inputArea.style.display = 'flex';
  messagesEl.innerHTML = `<div style="padding:20px;color:var(--muted)">Chargement des messages...</div>`;

  const coll = type === 'private' ? 'privateConversations' : 'groups';
  const messagesRef = db.collection(coll).doc(convId).collection('messages').orderBy('timestamp');

  convMessagesUnsub = messagesRef.onSnapshot(snapshot=>{
    const changes = snapshot.docChanges();
    if(changes.length === 0 && snapshot.empty){
      messagesEl.innerHTML = `<div style="padding:20px;color:var(--muted)">Pas encore de messages</div>`;
    } else {
      messagesEl.innerHTML = '';
      snapshot.forEach(doc=>{
        const msg = doc.data();
        const d = document.createElement('div');
        d.className = 'message ' + (msg.senderId === currentUser.uid ? 'user' : 'other');
        d.textContent = msg.text;
        messagesEl.appendChild(d);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    changes.forEach(change=>{
      if(change.type === 'added'){
        const msg = change.doc.data();
        if(msg.senderId && msg.senderId !== currentUser.uid){
          showNotification(title, msg.text);
        }
      }
    });

  }, err =>{
    console.error('messages err', err);
  });
}

/* --------------------
  ENVOYER MESSAGE
  -------------------- */
async function sendMessage(){
  const text = messageInput.value.trim();
  if(!text || !currentConvId) return;
  const coll = currentConvType === 'private' ? 'privateConversations' : 'groups';
  const messagesRef = db.collection(coll).doc(currentConvId).collection('messages');
  await messagesRef.add({
    text,
    senderId: currentUser.uid,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });
  await db.collection(coll).doc(currentConvId).update({
    lastMessage: text,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(()=>{});
  messageInput.value = '';
}

/* --------------------
  CREER CONVERSATION PRIVE
  -------------------- */
addBtn.addEventListener('click', ()=> modalPrivate.style.display = 'flex');
cancelPrivateBtn.addEventListener('click', ()=> {
  modalPrivate.style.display = 'none';
  privateContactInput.value = '';
});

createPrivateBtn.addEventListener('click', async ()=>{
  const contact = privateContactInput.value.trim();
  if(!contact) return alert('Indique un email ou numéro valide.');
  const query = contact.includes('@') ? db.collection('users').where('email','==',contact) : db.collection('users').where('phoneNumber','==',contact);
  const snap = await query.get();
  if(snap.empty) return alert('Utilisateur non trouvé');
  const otherId = snap.docs[0].id;
  if(otherId === currentUser.uid) return alert("C'est vous !");
  const existing = await db.collection('privateConversations').where('participants','array-contains', currentUser.uid).get();
  let convId = null;
  existing.forEach(d=> {
    const p = d.data().participants;
    if(p.includes(otherId) && p.length === 2) convId = d.id;
  });
  if(!convId){
    const newDoc = await db.collection('privateConversations').add({
      participants: [currentUser.uid, otherId],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: ''
    });
    convId = newDoc.id;
  }
  modalPrivate.style.display = 'none';
  privateContactInput.value = '';
  selectConversation(convId, 'private', snap.docs[0].data().displayName || (snap.docs[0].data().email || '').split('@')[0], otherId);
  if(window.innerWidth <= 780) document.body.classList.add('show-chat');
});

/* SEND button */
sendBtn.addEventListener('click', sendMessage);
messageInput.addEventListener('keypress', (e)=> { if(e.key === 'Enter') sendMessage(); });

/* --------------------
  NOTIFICATIONS LOCALES + SON + VIBRATION
  -------------------- */
function requestNotificationPermission(){
  if(!("Notification" in window)) return;
  if(Notification.permission === "default") Notification.requestPermission().then(p=>{});
}

function showNotification(title, body){
  showToast(title + ": " + body);
  if(Notification.permission === "granted"){
    const n = new Notification(title, { body, icon: null });
    n.onclick = ()=> window.focus();
  }
  try{ notifySound.currentTime = 0; notifySound.play().catch(()=>{}); } catch(e){}
  if(navigator.vibrate) navigator.vibrate(200);
}

function showToast(text){
  const t = document.createElement('div');
  t.style.position = 'fixed';
  t.style.right = '12px';
  t.style.bottom = '12px';
  t.style.background = 'rgba(0,0,0,0.7)';
  t.style.color = '#fff';
  t.style.padding = '10px 14px';
  t.style.borderRadius = '10px';
  t.style.boxShadow = '0 6px 20px rgba(0,0,0,0.4)';
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(()=> t.style.opacity = 0.0, 2500);
  setTimeout(()=> t.remove(), 3200);
}

/* --------------------
  IA CHARLES (simple demo)
  -------------------- */
function startAIChat(){
  chatTitle.textContent = 'Discussion avec CHARLES';
  inputArea.style.display = 'flex';
  if(convMessagesUnsub) convMessagesUnsub();
  const ref = db.collection('aiChats').doc(currentUser.uid).collection('messages').orderBy('timestamp');
  convMessagesUnsub = ref.onSnapshot(snapshot=>{
    messagesEl.innerHTML = '';
    snapshot.forEach(doc=>{
      const msg = doc.data();
      const d = document.createElement('div');
      d.className = 'message ' + (msg.sender === 'user' ? 'user' : 'other');
      d.textContent = msg.text;
      messagesEl.appendChild(d);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  sendBtn.onclick = async ()=>{
    const text = messageInput.value.trim();
    if(!text) return;
    const ref = db.collection('aiChats').doc(currentUser.uid).collection('messages');
    await ref.add({ text, sender: 'user', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    messageInput.value = '';
    const resp = generateAIResponse(text);
    setTimeout(()=> ref.add({ text:resp, sender:'ai', timestamp: firebase.firestore.FieldValue.serverTimestamp() }), 500);
  };
}

function generateAIResponse(input){
  const t = input.trim().toLowerCase();
  if(/^\d+\s*[\+\-\*\/]\s*\d+$/.test(t)){
    try{ return String(eval(t)); }catch(e){ return "Erreur calcul"; }
  }
  if(t.includes('qui es') || t.includes('ton nom')) return "Je suis CHARLES, l'IA de CHARTECH.";
  return "Message reçu — je suis en phase de test.";
}

/* --------------------
  NAV TAB SWITCH
  -------------------- */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    if(convMessagesUnsub) convMessagesUnsub();
    sendBtn.onclick = sendMessage;
    if(currentTab === 'settings'){
      chatTitle.textContent = 'Paramètres';
      inputArea.style.display = 'none';
      messagesEl.innerHTML = `<div style="padding:20px;color:var(--muted)">Paramètres (à implémenter)</div>`;
    } else if(currentTab === 'ai'){
      startAIChat();
    } else {
      loadConversations(currentTab);
      chatTitle.textContent = 'Sélectionnez une conversation';
      messagesEl.innerHTML = '';
      inputArea.style.display = 'none';
    }
  });
});

/* --------------------
  LOGOUT
  -------------------- */
document.getElementById('logout').addEventListener('click', ()=>{
  if(currentUser){
    rdb.ref('/status/' + currentUser.uid).set({ state:'offline', last_changed: firebase.database.ServerValue.TIMESTAMP });
  }
  auth.signOut();
});

/* --------------------
  UTILS
  -------------------- */
function timeAgo(ts){
  const d = new Date(ts);
  const s = Math.floor((Date.now() - d.getTime())/1000);
  if(s < 60) return `${s}s`;
  if(s < 3600) return `${Math.floor(s/60)}m`;
  if(s < 86400) return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}j`;
}
</script>
</body>
